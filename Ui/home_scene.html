<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;}
html,body{
width:100%;
height:100%;
overflow:hidden;
background:transparent;
}
canvas{
display:block;
width:100%;
height:100%;
}
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
(() => {

/* =======================================================
   RENDERER
======================================================= */
const renderer = new THREE.WebGLRenderer({
alpha:true,
antialias:true
});

renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setClearColor(0x000000,0);
document.body.appendChild(renderer.domElement);

/* =======================================================
   SCENE + CAMERA
======================================================= */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
55,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,0.5,4.2);

/* =======================================================
   COLORS
======================================================= */
const CYAN    = new THREE.Color(0x00f0ff);
const MAGENTA = new THREE.Color(0xff0099);
const VIOLET  = new THREE.Color(0x8b00ff);
const MINT    = new THREE.Color(0x00ffb3);

const palette=[CYAN,MAGENTA,VIOLET,MINT];

/* =======================================================
   CENTER SPHERE
======================================================= */
const icoGeo=new THREE.IcosahedronGeometry(1.6,2);
const posAttr=icoGeo.getAttribute("position");
const vertCount=posAttr.count;

const nodePos=new Float32Array(vertCount*3);
const nodeCol=new Float32Array(vertCount*3);

for(let i=0;i<vertCount;i++){

nodePos[i*3]=posAttr.getX(i);
nodePos[i*3+1]=posAttr.getY(i);
nodePos[i*3+2]=posAttr.getZ(i);

const c=palette[i%palette.length];

nodeCol[i*3]=c.r;
nodeCol[i*3+1]=c.g;
nodeCol[i*3+2]=c.b;
}

const nodeGeo=new THREE.BufferGeometry();
nodeGeo.setAttribute("position",new THREE.BufferAttribute(nodePos,3));
nodeGeo.setAttribute("color",new THREE.BufferAttribute(nodeCol,3));

const nodeMat=new THREE.PointsMaterial({
size:0.07,
vertexColors:true,
transparent:true,
opacity:0.95,
depthWrite:false
});

const nodes=new THREE.Points(nodeGeo,nodeMat);
scene.add(nodes);

/* wireframe */
const wireframe=new THREE.LineSegments(
new THREE.WireframeGeometry(icoGeo),
new THREE.LineBasicMaterial({
color:0x00f0ff,
transparent:true,
opacity:0.13
})
);

scene.add(wireframe);

/* shell */
const shell=new THREE.Mesh(
icoGeo,
new THREE.MeshBasicMaterial({
color:0x00f0ff,
transparent:true,
opacity:0.03,
side:THREE.DoubleSide
})
);

scene.add(shell);

/* =======================================================
   RINGS
======================================================= */
function makeRing(radius,color,opacity){

return new THREE.Mesh(
new THREE.RingGeometry(radius-.005,radius+.005,128),
new THREE.MeshBasicMaterial({
color,
transparent:true,
opacity,
side:THREE.DoubleSide
})
);

}

const ring1=makeRing(2.3,0x00f0ff,0.14);
ring1.rotation.x=Math.PI*.45;
ring1.rotation.y=Math.PI*.1;
scene.add(ring1);

const ring2=makeRing(2.6,0xff0099,0.10);
ring2.rotation.x=Math.PI*.7;
ring2.rotation.y=Math.PI*.35;
scene.add(ring2);

const ring3=makeRing(2.1,0x8b00ff,0.08);
ring3.rotation.x=Math.PI*.25;
ring3.rotation.y=Math.PI*.6;
scene.add(ring3);

/* =======================================================
   LEFT + RIGHT SIDE CLUSTERS
======================================================= */
function createSideCluster(sideX,color1,color2){

const group=new THREE.Group();

for(let i=0;i<45;i++){

const dot=new THREE.Mesh(
new THREE.SphereGeometry(0.025,8,8),
new THREE.MeshBasicMaterial({
color:i%2===0?color1:color2,
transparent:true,
opacity:0.9
})
);

dot.position.set(
sideX+(Math.random()-.5)*2,
(Math.random()-.5)*3.8,
-0.5+Math.random()
);

dot.userData.speed=0.003+Math.random()*0.004;

group.add(dot);
}

scene.add(group);
return group;
}

const leftCluster=createSideCluster(-3.3,0x00f0ff,0x8b00ff);
const rightCluster=createSideCluster(3.3,0xff0099,0x00f0ff);

/* =======================================================
   WHOLE PAGE PARTICLES
======================================================= */
const DUST=1000;

const dustPos=new Float32Array(DUST*3);
const dustCol=new Float32Array(DUST*3);
const dustVel=[];

for(let i=0;i<DUST;i++){

dustPos[i*3]=(Math.random()-.5)*20;
dustPos[i*3+1]=(Math.random()-.5)*12;
dustPos[i*3+2]=(Math.random()-.5)*14;

dustVel.push({
x:(Math.random()-.5)*0.006,
y:(Math.random()-.5)*0.006,
z:(Math.random()-.5)*0.002
});

const c=palette[Math.floor(Math.random()*palette.length)];

dustCol[i*3]=c.r;
dustCol[i*3+1]=c.g;
dustCol[i*3+2]=c.b;
}

const dustGeo=new THREE.BufferGeometry();
dustGeo.setAttribute("position",new THREE.BufferAttribute(dustPos,3));
dustGeo.setAttribute("color",new THREE.BufferAttribute(dustCol,3));

const dust=new THREE.Points(
dustGeo,
new THREE.PointsMaterial({
size:0.018,
vertexColors:true,
transparent:true,
opacity:0.55,
depthWrite:false
})
);

scene.add(dust);

/* =======================================================
   PULSE
======================================================= */
const pulse=new THREE.Mesh(
new THREE.RingGeometry(0.01,0.03,64),
new THREE.MeshBasicMaterial({
color:0x00f0ff,
transparent:true,
opacity:0.35,
side:THREE.DoubleSide
})
);

pulse.rotation.x=Math.PI*.5;
scene.add(pulse);

/* =======================================================
   ANIMATION
======================================================= */
const clock=new THREE.Clock();

function animate(){

requestAnimationFrame(animate);

const t=clock.getElapsedTime();

/* center rotation */
[nodes,wireframe,shell].forEach(obj=>{
obj.rotation.y=t*0.12;
obj.rotation.x=Math.sin(t*0.06)*0.2;
});

/* rings */
ring1.rotation.z=t*0.08;
ring2.rotation.z=-t*0.06;
ring3.rotation.z=t*0.10;

/* breathing */
const s=1+Math.sin(t*0.8)*0.04;
[nodes,wireframe,shell].forEach(obj=>{
obj.scale.set(s,s,s);
});

/* pulse */
const cycle=(t*0.4)%1;
const pulseScale=1.6+cycle*2.5;
pulse.scale.set(pulseScale,pulseScale,pulseScale);
pulse.material.opacity=0.35*(1-cycle);

/* node shimmer */
const colArr=nodeGeo.getAttribute("color").array;

for(let i=0;i<vertCount;i++){

const bright=0.7+0.3*Math.sin(t*2+i*0.5);
const c=palette[i%palette.length];

colArr[i*3]=c.r*bright;
colArr[i*3+1]=c.g*bright;
colArr[i*3+2]=c.b*bright;
}

nodeGeo.getAttribute("color").needsUpdate=true;

/* background particles */
const arr=dust.geometry.attributes.position.array;

for(let i=0;i<DUST;i++){

arr[i*3]+=dustVel[i].x;
arr[i*3+1]+=dustVel[i].y;
arr[i*3+2]+=dustVel[i].z;

if(arr[i*3]>10) arr[i*3]=-10;
if(arr[i*3]<-10) arr[i*3]=10;

if(arr[i*3+1]>6) arr[i*3+1]=-6;
if(arr[i*3+1]<-6) arr[i*3+1]=6;
}

dust.geometry.attributes.position.needsUpdate=true;

/* side clusters animate */
[leftCluster,rightCluster].forEach((group,gi)=>{

group.children.forEach((dot,i)=>{

dot.position.y+=dot.userData.speed;

if(dot.position.y>2.5){
dot.position.y=-2.5;
}

dot.material.opacity=
0.45+Math.sin(t*3+i+gi)*0.4;

});

});

renderer.render(scene,camera);
}

animate();

/* =======================================================
   RESIZE
======================================================= */
window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

})();
</script>

</body>
</html>
