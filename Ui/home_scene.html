<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: transparent; }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
  /* ── Renderer ──────────────────────────────────────────────────── */
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);
  document.body.appendChild(renderer.domElement);

  /* ── Scene + Camera ────────────────────────────────────────────── */
  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(
    55, window.innerWidth / window.innerHeight, 0.1, 1000
  );
  camera.position.set(0, 0, 4.5);

  /* ── Palette ────────────────────────────────────────────────────── */
  const CYAN    = new THREE.Color(0x00f0ff);
  const MAGENTA = new THREE.Color(0xff0099);
  const VIOLET  = new THREE.Color(0x8b00ff);
  const MINT    = new THREE.Color(0x00ffb3);

  /* ── Central Neural Sphere (ico vertices + edges) ──────────────── */
  const icoGeo  = new THREE.IcosahedronGeometry(1.6, 2);  // detail=2 → 42 verts
  const posAttr = icoGeo.getAttribute('position');
  const vertCount = posAttr.count;

  // Node particles at each vertex
  const nodePositions = new Float32Array(vertCount * 3);
  const nodeColors    = new Float32Array(vertCount * 3);
  const palette = [CYAN, MAGENTA, VIOLET, MINT];

  for (let i = 0; i < vertCount; i++) {
    nodePositions[i*3]   = posAttr.getX(i);
    nodePositions[i*3+1] = posAttr.getY(i);
    nodePositions[i*3+2] = posAttr.getZ(i);
    const c = palette[i % palette.length];
    nodeColors[i*3]   = c.r;
    nodeColors[i*3+1] = c.g;
    nodeColors[i*3+2] = c.b;
  }

  const nodeGeo = new THREE.BufferGeometry();
  nodeGeo.setAttribute('position', new THREE.BufferAttribute(nodePositions, 3));
  nodeGeo.setAttribute('color',    new THREE.BufferAttribute(nodeColors, 3));

  const nodeMat = new THREE.PointsMaterial({
    size: 0.07,
    vertexColors: true,
    transparent: true,
    opacity: 0.95,
    sizeAttenuation: true,
    depthWrite: false,
  });
  const nodes = new THREE.Points(nodeGeo, nodeMat);
  scene.add(nodes);

  // Wireframe edges between vertices
  const edgeMat = new THREE.LineBasicMaterial({
    color: 0x00f0ff,
    transparent: true,
    opacity: 0.12,
  });
  const wireframe = new THREE.LineSegments(
    new THREE.WireframeGeometry(icoGeo),
    edgeMat
  );
  scene.add(wireframe);

  // Solid shell (very faint glow)
  const shellMat = new THREE.MeshBasicMaterial({
    color: 0x00f0ff,
    transparent: true,
    opacity: 0.03,
    side: THREE.DoubleSide,
  });
  const shell = new THREE.Mesh(icoGeo, shellMat);
  scene.add(shell);

  /* ── Orbiting Rings ────────────────────────────────────────────── */
  function makeRing(radius, color, opacity) {
    const ringGeo = new THREE.RingGeometry(radius - 0.005, radius + 0.005, 128);
    const ringMat = new THREE.MeshBasicMaterial({
      color, transparent: true, opacity, side: THREE.DoubleSide,
    });
    return new THREE.Mesh(ringGeo, ringMat);
  }

  const ring1 = makeRing(2.3, 0x00f0ff, 0.15);
  ring1.rotation.x = Math.PI * 0.45;
  ring1.rotation.y = Math.PI * 0.1;
  scene.add(ring1);

  const ring2 = makeRing(2.6, 0xff0099, 0.1);
  ring2.rotation.x = Math.PI * 0.7;
  ring2.rotation.y = Math.PI * 0.35;
  scene.add(ring2);

  const ring3 = makeRing(2.1, 0x8b00ff, 0.08);
  ring3.rotation.x = Math.PI * 0.25;
  ring3.rotation.y = Math.PI * 0.6;
  scene.add(ring3);

  /* ── Ambient Particle Dust ─────────────────────────────────────── */
  const DUST = 600;
  const dustPos = new Float32Array(DUST * 3);
  const dustCol = new Float32Array(DUST * 3);
  for (let i = 0; i < DUST; i++) {
    dustPos[i*3]   = (Math.random() - 0.5) * 12;
    dustPos[i*3+1] = (Math.random() - 0.5) * 12;
    dustPos[i*3+2] = (Math.random() - 0.5) * 12;
    const c = palette[Math.floor(Math.random() * palette.length)];
    dustCol[i*3]   = c.r;
    dustCol[i*3+1] = c.g;
    dustCol[i*3+2] = c.b;
  }
  const dustGeo = new THREE.BufferGeometry();
  dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
  dustGeo.setAttribute('color',    new THREE.BufferAttribute(dustCol, 3));
  const dustMat = new THREE.PointsMaterial({
    size: 0.015, vertexColors: true, transparent: true, opacity: 0.5,
    sizeAttenuation: true, depthWrite: false,
  });
  const dust = new THREE.Points(dustGeo, dustMat);
  scene.add(dust);

  /* ── Pulse Ring (expanding outward) ────────────────────────────── */
  const pulseGeo = new THREE.RingGeometry(0.01, 0.03, 64);
  const pulseMat = new THREE.MeshBasicMaterial({
    color: 0x00f0ff, transparent: true, opacity: 0.4, side: THREE.DoubleSide,
  });
  const pulse = new THREE.Mesh(pulseGeo, pulseMat);
  pulse.rotation.x = Math.PI * 0.5;
  scene.add(pulse);

  /* ── Animation Loop ────────────────────────────────────────────── */
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Core rotation
    const coreGroup = [nodes, wireframe, shell];
    coreGroup.forEach(obj => {
      obj.rotation.y = t * 0.12;
      obj.rotation.x = Math.sin(t * 0.06) * 0.2;
    });

    // Ring orbits
    ring1.rotation.z = t * 0.08;
    ring2.rotation.z = -t * 0.06;
    ring3.rotation.z = t * 0.1;

    // Dust drift
    dust.rotation.y = t * 0.015;
    dust.rotation.x = Math.sin(t * 0.01) * 0.05;

    // Breathing scale on core
    const s = 1 + Math.sin(t * 0.8) * 0.04;
    coreGroup.forEach(obj => obj.scale.set(s, s, s));

    // Pulse ring expansion
    const pulseCycle = (t * 0.4) % 1;
    const pulseScale = 1.6 + pulseCycle * 2.5;
    pulse.scale.set(pulseScale, pulseScale, pulseScale);
    pulseMat.opacity = 0.35 * (1 - pulseCycle);

    // Node shimmer
    const colArr = nodeGeo.getAttribute('color').array;
    for (let i = 0; i < vertCount; i++) {
      const brightness = 0.7 + 0.3 * Math.sin(t * 2 + i * 0.5);
      const c = palette[i % palette.length];
      colArr[i*3]   = c.r * brightness;
      colArr[i*3+1] = c.g * brightness;
      colArr[i*3+2] = c.b * brightness;
    }
    nodeGeo.getAttribute('color').needsUpdate = true;

    renderer.render(scene, camera);
  }
  animate();

  /* ── Resize ────────────────────────────────────────────────────── */
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
